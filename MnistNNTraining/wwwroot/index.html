<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MNIST Neural Network Trainer</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="MnistNNTraining.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d1117;color:#c9d1d9;">
            <div style="text-align:center;">
                <div style="font-size:2rem;margin-bottom:1rem;">🧠</div>
                <div>Loading MNIST Neural Network Trainer...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;width:100%;background:#ffdddd;padding:0.5rem;text-align:center;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Helper for file download from Blazor
        window.downloadFile = function (filename, content) {
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
    </script>
</body>
</html>
